# nginx configuration for Django backend
# Place this in your nginx sites-available directory

server {
    listen 80;
    server_name api.searcherlist.com;
    
    # Increase client body size for file uploads
    client_max_body_size 50M;
    
    # Increase timeout for large file processing
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    
    location / {
        proxy_pass http://127.0.0.1:8000;  # Your Django server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Media files (if serving through nginx)
    location /media/ {
        alias /path/to/your/project/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Static files (if serving through nginx)
    location /static/ {
        alias /path/to/your/project/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS configuration (recommended for production)
