version: 0.2

phases:
  build:
    commands:
      - echo "Starting deployment to ${EC2_INSTANCE_ID}"
      - export COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION}"
      - |
        cat > ssm-commands.json <<EOF
        {
          "commands": [
            "set -euxo pipefail",
            "cd ${APP_DIR}",
            "git fetch --all --tags",
            "git checkout ${COMMIT_SHA}",
            "git submodule update --init --recursive || true",
            "printf 'APP_PORT=%s\\n' '${APP_PORT}' > .env.compose",
            "docker compose --env-file .env.compose -f prod.yml up -d --build --no-deps django"
          ]
        }
        EOF
      - COMMAND_ID=$(aws ssm send-command --instance-ids "${EC2_INSTANCE_ID}" --document-name "AWS-RunShellScript" --comment "Deploy ${COMMIT_SHA}" --parameters file://ssm-commands.json --query 'Command.CommandId' --output text)
      - aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}"
      - aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}"
