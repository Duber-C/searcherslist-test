version: 0.2

phases:
  build:
    commands:
      - set -eu
      - echo "Starting deployment to ${EC2_INSTANCE_ID}"
      - export COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION}"
      - |
        cat > ssm-commands.json <<EOF
        {
          "commands": [
            "set -euxo pipefail",
            "if ! command -v git >/dev/null 2>&1; then if command -v dnf >/dev/null 2>&1; then dnf install -y git; elif command -v yum >/dev/null 2>&1; then yum install -y git; elif command -v apt-get >/dev/null 2>&1; then apt-get update -y && apt-get install -y git; else echo 'git is required but no supported package manager was found' >&2; exit 1; fi; fi",
            "if ! docker compose version >/dev/null 2>&1; then if command -v dnf >/dev/null 2>&1; then dnf install -y docker docker-compose-plugin; elif command -v yum >/dev/null 2>&1; then yum install -y docker docker-compose-plugin; elif command -v apt-get >/dev/null 2>&1; then apt-get update -y && apt-get install -y docker.io docker-compose-plugin; else echo 'docker compose is required but no supported package manager was found' >&2; exit 1; fi; systemctl enable --now docker; fi",
            "if [ ! -d '${APP_DIR}/.git' ]; then mkdir -p '${APP_DIR}'; git clone --branch '${DEPLOY_BRANCH}' '${REPO_URL}' '${APP_DIR}'; fi",
            "cd ${APP_DIR}",
            "git fetch --all --tags",
            "git checkout ${COMMIT_SHA}",
            "git submodule update --init --recursive || true",
            "printf 'APP_PORT=%s\\n' '${APP_PORT}' > .env.compose",
            "docker compose --env-file .env.compose -f prod.yml up -d --build --no-deps django"
          ]
        }
        EOF
      - COMMAND_ID=$(aws ssm send-command --instance-ids "${EC2_INSTANCE_ID}" --document-name "AWS-RunShellScript" --comment "Deploy ${COMMIT_SHA}" --parameters file://ssm-commands.json --query 'Command.CommandId' --output text)
      - 'echo "SSM command id: ${COMMAND_ID}"'
      - |
        set +e
        aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}"
        WAIT_EXIT=$?
        set -e

        INVOCATION_JSON=$(aws ssm get-command-invocation \
          --command-id "${COMMAND_ID}" \
          --instance-id "${EC2_INSTANCE_ID}" \
          --output json)

        echo "${INVOCATION_JSON}"

        STATUS=$(printf '%s' "${INVOCATION_JSON}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["Status"])')
        if [ "${STATUS}" != "Success" ] || [ "${WAIT_EXIT}" -ne 0 ]; then
          echo "Remote deployment failed with status: ${STATUS}" >&2
          exit 1
        fi
