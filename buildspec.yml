version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running tests..."
      - cd src
      - python -m pytest tests/ -v --tb=short || true   # remove '|| true' to fail on test failures
      - cd ..

  build:
    commands:
      - echo "Collecting static files..."
      - cd src
      - DJANGO_SETTINGS_MODULE=config.settings.prod
          SECRET_KEY=build-phase-placeholder
          POSTGRES_HOST=localhost
          python manage.py collectstatic --noinput --settings=config.settings.prod 2>/dev/null || true
      - cd ..
      # Sync static files to S3
      - aws s3 sync src/staticfiles/ s3://$STATIC_BUCKET/ --delete --cache-control "max-age=86400"

  post_build:
    commands:
      - echo "Build complete."

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - "venv/**"
    - ".git/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "deploy/**"
  name: build-artifact
