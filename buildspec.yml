version: 0.2

env:
  variables:
    ECR_REPO_NAME: searchers-backend

phases:
  pre_build:
    commands:
      - echo "Logging into ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      # - cd src
      # - python -m pytest tests/ -v --tb=short || true
      # - cd ..

  build:
    commands:
      - echo "Building Docker image..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker build -t $ECR_REPO:$IMAGE_TAG -f compose/Dockerfile .
      - docker push $ECR_REPO:$IMAGE_TAG
      - echo "ECR_IMAGE=$ECR_REPO:$IMAGE_TAG" > deploy/.image

  post_build:
    commands:
      - echo "Build complete."

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - "venv/**"
    - ".git/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
  name: build-artifact
