services:
  django:
    image: ${ECR_IMAGE}
    command: /start-django
    restart: unless-stopped
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./src:/app
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./compose/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - django
