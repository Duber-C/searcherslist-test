services:
  db:
    image: "postgres:18"
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 2s

  django:
    build:
      context: .
      dockerfile: compose/Dockerfile
    working_dir: /app/app
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn searcher_api.wsgi:application --bind 0.0.0.0:${APP_PORT:-8000} --workers 3 --timeout 120"
    restart: unless-stopped
    ports:
      - "80:${APP_PORT:-8000}"
    volumes:
      - ./src/staticfiles:/app/app/staticfiles
      - ./src/media:/app/app/media
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
      - .env.db
    environment:
      DJANGO_SETTINGS_MODULE: searcher_api.settings

volumes:
  postgres_data: {}
