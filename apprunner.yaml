version: 1.0
runtime: python311

build:
  commands:
    build:
      - python3 -m venv /app/.venv
      - /app/.venv/bin/python -m pip install --upgrade pip
      - /app/.venv/bin/python -m pip install -r requirements.txt

run:
  command: |
    /app/.venv/bin/python manage.py migrate &&
    /app/.venv/bin/python -m gunicorn searcher_api.wsgi:application --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 120
  network:
    port: 8080
